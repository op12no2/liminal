<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Sequencer</title>
  <link rel="stylesheet" href="led.css?next=1">
  <link rel="stylesheet" href="transport.css?next=1">
  <link rel="stylesheet" href="liminal.css?next=1">
</head>
<body>
  <div class="top-bar">
    <div id="transport-container">
    </div>
  <div class="led-container" id="midi-led" style="margin-left: auto;">
  </div>
  </div>
  <div class="main-content">
    <div class="canvas-area">
      <canvas id="seq-canvas"></canvas>
    </div>
    <div class="inspector-panel">
      <div class="inspector-section">
        <div class="inspector-title">Selection</div>
        <div id="selection-info">No selection</div>
      </div>
      <div class="inspector-section">
        <div class="inspector-title">MIDI</div>
        <div class="selection-data" id="row1-container">
        </div>
        <div class="selection-data" id="row2-container">
        </div>
        <div class="selection-data" id="row3-container">
        </div>
      </div>
    </div>
  </div>
  <script src="led.js?next=1"></script>
  <script src="transport.js?next=1"></script>
  <script src="synthknob.js?next=1"></script>
  <script src="midi.js?next=1"></script>
  <script src="liminal.js?next=1"></script>
</body>
</html>
