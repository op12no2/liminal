<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Sequencer</title>
  <link rel="stylesheet" href="liminal.css">
</head>
<body>
  <!-- Top transport bar -->
  <div class="transport-bar">
    <button class="transport-button" id="play-btn" title="Play">?</button>
    <button class="transport-button" id="stop-btn" title="Stop">¦</button>
    <button class="transport-button" id="record-btn" title="Record">?</button>
  </div>

  <div class="main-content">
    <div class="canvas-area">
      <canvas id="seq-canvas"></canvas>
    </div>
    <div class="inspector-panel">
      <div class="inspector-section">
        <div class="inspector-title">Selection</div>
        <div id="selection-info">No selection</div>
      </div>

      <div class="inspector-section">
        <div class="inspector-title">Properties</div>
        <div id="properties-container">
          <!-- Knobs and controls will be added here dynamically -->
        </div>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/webmidi@latest/dist/iife/webmidi.iife.js"></script>
  <script src="liminal.js"></script>
</body>
</html>
