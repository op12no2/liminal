<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal</title>
  <link rel="stylesheet" href="liminal.css?next=2">
</head>
<body>
  <div class="top-bar"><span id="status-text">Midi not found.</span>
    <div style="margin-left: auto; display: flex; align-items: center;">
      <div id="btn-play"> </div>
      <div id="btn-stop"> </div>
      <div id="btn-settings"> </div>
      <div id="btn-midi"> </div>
    </div>
  </div>
  <div class="main-content">
    <div class="canvas-area">
      <canvas id="seq-canvas"></canvas>
    </div>
    <div class="inspector-panel">
      <div class="inspector-section">
        <div class="inspector-title" id="inspector-title">Liminal</div>
      </div>
      <div class="inspector-section">
        <div id="row1-container" class="knob-row">Ctrl/Cmd + click<br>to drop notes.</div>
        <div id="row2-container" class="knob-row">UNRELEASED PREVIEW</div>
        <div id="row3-container" class="knob-row"></div>
      </div>
    </div>
  </div>
  <script src="hardware-button.js?next=2"></script>
  <script src="synthknob.js?next=2"></script>
  <script src="midi.js?next=2"></script>
  <script src="liminal.js?next=2"></script>
</body>
</html>
